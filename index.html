<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESETZ • H.O.T.C Colours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-feature-settings: "tnum";
        }

        .gt-style {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.01em;
            font-weight: 500;
        }

        .big-image {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            border-radius: 12px;
        }

        .image-label {
            position: absolute;
            top: 16px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 9999px;
        }

        .before-label {
            left: 16px;
            background: #111827;
            color: white;
        }

        .after-label {
            right: 16px;
            background: #c5a46e;
            color: #111827;
        }

        .pair {
            margin-bottom: 4rem;
        }
    </style>
</head>
<body class="bg-white text-zinc-900">
    <!-- Ultra Minimal Nav -->
    <nav class="border-b border-zinc-100 py-6">
        <div class="max-w-5xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <span class="font-semibold tracking-[2px] text-lg">PRESETZ</span>
                <span class="text-xs px-2 py-0.5 rounded bg-amber-100 text-amber-600">H.O.T.C</span>
            </div>
            <a href="https://www.colourstorepresets.com" target="_blank" class="text-xs tracking-widest hover:text-amber-600 transition-colors">COLOUR STORE</a>
        </div>
    </nav>

    <!-- Minimal Header -->
    <div class="max-w-5xl mx-auto px-6 pt-12 pb-8 text-center">
        <h1 class="gt-style text-5xl md:text-6xl tracking-[-1.5px] font-semibold">H.O.T.C Colours</h1>
        <p class="mt-2 text-sm text-zinc-500 tracking-[1px]">BEFORE & AFTER</p>
    </div>

    <!-- Big Image Gallery -->
    <div class="max-w-5xl mx-auto px-6 pb-16">

        <!-- Pack 1 -->
        <div class="pair">
            <div class="mb-3 flex items-center justify-between">
                <span class="gt-style text-sm tracking-[1px] text-zinc-400">CHEE TAH SIGNATURE</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <img src="https://picsum.photos/id/1005/1200/750" alt="Before" class="big-image border border-zinc-200">
                    <div class="image-label before-label">BEFORE</div>
                </div>
                <div class="relative">
                    <img src="https://picsum.photos/id/1011/1200/750" alt="After" class="big-image border border-zinc-200">
                    <div class="image-label after-label">AFTER</div>
                </div>
            </div>
        </div>

        <!-- Pack 2 -->
        <div class="pair">
            <div class="mb-3 flex items-center justify-between">
                <span class="gt-style text-sm tracking-[1px] text-zinc-400">TEMPLE HERITAGE</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <img src="https://picsum.photos/id/1009/1200/750" alt="Before" class="big-image border border-zinc-200">
                    <div class="image-label before-label">BEFORE</div>
                </div>
                <div class="relative">
                    <img src="https://picsum.photos/id/160/1200/750" alt="After" class="big-image border border-zinc-200">
                    <div class="image-label after-label">AFTER</div>
                </div>
            </div>
        </div>

        <!-- Pack 3 -->
        <div class="pair">
            <div class="mb-3 flex items-center justify-between">
                <span class="gt-style text-sm tracking-[1px] text-zinc-400">IVORY & GLOW</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="relative">
                    <img src="https://picsum.photos/id/201/1200/750" alt="Before" class="big-image border border-zinc-200">
                    <div class="image-label before-label">BEFORE</div>
                </div>
                <div class="relative">
                    <img src="https://picsum.photos/id/251/1200/750" alt="After" class="big-image border border-zinc-200">
                    <div class="image-label after-label">AFTER</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Minimal Footer Note -->
    <div class="max-w-5xl mx-auto px-6 pb-12 text-center">
        <p class="text-[10px] text-zinc-400 tracking-widest">Replace placeholders with your real before & after images • Colour Store H.O.T.C Colours</p>
    </div>

</body>
</html>
